<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creator Incubation Workspace</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "Pretendard", "Noto Sans KR", "system-ui", "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="/workspace/workspace.css?v=20260318d" />
  </head>
  <body class="workspace-body min-h-screen text-slate-900">
    <div id="workspace-app" class="min-h-screen">
      <section id="auth-gate" class="flex min-h-screen items-center justify-center px-4 py-10">
        <div class="workspace-surface w-full max-w-xl rounded-[32px] border border-slate-200 bg-white p-8 shadow-[0_24px_44px_rgba(15,23,42,0.08)]">
          <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-slate-500">Creator Incubation Workspace</p>
          <h1 class="mt-4 text-4xl font-semibold tracking-tight text-slate-950">
            Private planning board for creators and the company team.
          </h1>
          <p class="mt-4 text-sm leading-7 text-slate-500" data-auth-note>
            Sign in with the creator ID and password that the team assigned to you.
          </p>
          <form class="mt-8 space-y-4" data-workspace-auth-form>
            <div>
              <label for="workspace-login-id" class="block text-sm font-medium text-slate-700">Creator ID</label>
              <input
                id="workspace-login-id"
                type="text"
                autocomplete="username"
                placeholder="chaehee"
                class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-slate-400 focus:bg-white"
              />
            </div>
            <div>
              <label for="workspace-password" class="block text-sm font-medium text-slate-700">Password</label>
              <input
                id="workspace-password"
                type="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-slate-400 focus:bg-white"
              />
            </div>
            <button
              type="submit"
              data-workspace-auth-submit
              class="inline-flex w-full items-center justify-center rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800"
            >
              Enter workspace
            </button>
          </form>
          <div class="mt-4 flex flex-wrap gap-3">
            <a
              href="/"
              class="inline-flex items-center justify-center rounded-full border border-slate-200 px-5 py-3 text-sm font-semibold text-slate-600 transition hover:border-slate-300 hover:bg-slate-50"
            >
              Back to site
            </a>
          </div>
        </div>
      </section>

      <div id="workspace-layout" class="hidden min-h-screen lg:flex">
        <aside id="workspace-sidebar" class="workspace-sidebar border-b border-r border-slate-200/80 bg-[#f5f5f3] lg:border-b-0"></aside>

        <main class="min-w-0 flex-1">
          <header id="workspace-header" class="sticky top-0 z-20 border-b border-slate-200/80 bg-white/90 backdrop-blur"></header>

          <div class="mx-auto flex w-full max-w-7xl flex-col gap-6 px-4 py-6 sm:px-6 lg:px-8">
            <nav id="workspace-tabs" class="workspace-tabs"></nav>
            <div id="workspace-notice"></div>

            <section id="panel-overview" data-panel="overview" class="workspace-panel"></section>
            <section id="panel-meetings" data-panel="meetings" class="workspace-panel" hidden></section>
            <section id="panel-pipeline" data-panel="pipeline" class="workspace-panel" hidden></section>
            <section id="panel-feedback" data-panel="feedback" class="workspace-panel" hidden></section>
            <section id="panel-timeline" data-panel="timeline" class="workspace-panel" hidden></section>
          </div>
        </main>
      </div>

      <div id="workspace-modal" class="workspace-modal hidden"></div>
      <div id="workspace-toast" class="workspace-toast"></div>
    </div>

    <script type="module" src="/workspace/workspace.js?v=20260318e"></script>
  </body>
</html>
